<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Add Product</title>
	</head>
	<body>
		<p th:text=${msg} />
		<form th:action="@{/addProduct}" th:object="${product}" method="POST" >
			<table>
				<tr>
					<td>Product Id :</td>
					<td><input type="text" th:field="*{pid}"/></td>
					<td th:if="${#fields.hasErrors('pid')}" th:errors="*{pid}"></td>
				</tr>
				<tr>
					<td>Product Name :</td>
					<td><input type="text" th:field="*{pname}"/></td>
					<td th:if="${#fields.hasErrors('pname')}" th:errors="*{pname}"></td>
				</tr>
				<tr>
					<td>Product Price :</td>
					<td><input type="text" th:field="*{price}"/></td>
					<td th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></td>
				</tr>
				<tr>
					<td></td>
					<td><input type="submit" value="save product"/></td>
				</tr>
			</table>
		</form>
	</body>
</html>
